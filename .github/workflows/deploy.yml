# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]          # or whatever your default branch is
  workflow_dispatch: {}       # manual trigger

permissions:                  # required by Pages
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4               # pull your code
      - uses: pnpm/action-setup@v4              # install pnpm 10.x
        with: {version: 10, run_install: false}
      - uses: actions/setup-node@v4             # install Node & cache pnpm
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile      # restore deps
      - run: pnpm run build                     # must emit static files
      - uses: actions/upload-pages-artifact@v3  # pack the ./dist folder
        with: {path: ./dist}                    # ⇧ adjust if your build dir differs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency: {group: pages, cancel-in-progress: true}
    steps:
      - uses: actions/deploy-pages@v4           # publish the artifact
        id: deployment