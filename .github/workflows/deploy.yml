name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # pull your code
      - uses: actions/setup-node@v4 # install Node & cache npm
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build -- --base=/sweepy/
      - uses: actions/upload-pages-artifact@v3 # pack the ./dist folder
        with: { path: ./dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency: { group: pages, cancel-in-progress: true }
    steps:
      - uses: actions/deploy-pages@v4 # publish the artifact
        id: deployment
