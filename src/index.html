<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Millionsweeper</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="icon" href="/sprite.png">
</head>
<body>
  <div id="ui">
    <h1>Millionsweeper</h1>
    <div class="controls">
      <button id="generateButton">Generate Map</button>
    </div>
    <div class="instructions">
      <p>Left click: Reveal cell</p>
      <p>Right click: Place flag</p>
      <p>Mouse wheel: Zoom in/out</p>
      <p>Debug toggle: Show all cells</p>
    </div>
  </div>

  <script type="module" src="./js/main.ts"></script>
</body>
</html>
